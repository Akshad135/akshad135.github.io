<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Pipeline Failed - Akshad Agrawal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/logo.png" />
    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* 404 Specific Animations & Styles */
        .run-header-404 {
            opacity: 0;
            animation: fadeIn .4s ease forwards .2s;
        }

        .h1-404 {
            opacity: 0;
            animation: slideUp .5s ease forwards .35s;
        }

        .sub-404 {
            opacity: 0;
            animation: slideUp .5s ease forwards .5s;
        }

        .pipeline-card-404 {
            opacity: 0;
            animation: fadeIn .5s ease forwards .65s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .stage {
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .3s ease, transform .3s ease;
        }

        .stage.show {
            opacity: 1;
            transform: translateY(0);
        }

        .connector {
            transition: background .3s;
        }

        .connector.lit {
            background-color: #3b82f6;
        }

        .connector.dead {
            background-color: #ef4444;
        }

        .connector.warn {
            background-color: #eab308;
        }

        .actions-404 {
            opacity: 0;
            animation: slideUp .5s ease forwards 4.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .spinning {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    </style>
</head>

<body class="antialiased selection:bg-white selection:text-black">
    <div id="loader-overlay">
        <div class="terminal-loader-card">
            <div class="terminal-header">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
                <div class="ml-2 text-xs text-gray-500 font-mono">system_boot</div>
            </div>
            <div class="loader-content" id="loader-content"></div>
        </div>
    </div>

    <canvas id="vector-canvas"></canvas>

    <nav class="fixed w-full z-50 glass-nav transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between relative z-50">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="./assets/logo.png" alt="AA Logo"
                    class="w-16 h-16 object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-[0_0_8px_rgba(59,130,246,0.6)]" />
                <span class="text-xl font-bold tracking-tight text-white">
                    Akshad Agrawal<span class="text-blue-500">.</span>
                </span>
            </a>
            <div class="hidden md:flex gap-10 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-blue-400 transition-colors duration-200">Return Home</a>
            </div>
            <button id="menu-btn"
                class="md:hidden text-white focus:outline-none z-50 w-8 h-8 flex flex-col justify-center gap-1.5">
                <span class="hamburger-line line-1 w-full h-0.5 bg-white block"></span>
                <span class="hamburger-line line-2 w-full h-0.5 bg-white block"></span>
                <span class="hamburger-line line-3 w-full h-0.5 bg-white block"></span>
            </button>
        </div>
    </nav>

    <div id="mobile-menu-overlay" class="mobile-menu-overlay md:hidden">
        <div class="flex flex-col gap-8 text-center">
            <a href="index.html" class="mobile-link" onclick="toggleMenu()">Return Home</a>
        </div>
    </div>

    <main class="min-h-[100dvh] flex items-center justify-center px-4 md:px-6 pt-20 md:pt-24 pb-12 relative z-10">
        <div class="max-w-2xl w-full mx-auto">
            <div class="run-header-404 flex items-center justify-between mb-3">
                <span class="font-mono text-xs md:text-sm text-gray-500">DAG_RUN_ID: 404-whoops</span>
                <span
                    class="font-mono text-[10px] md:text-xs px-3 py-1 rounded bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 font-semibold tracking-wide">●
                    CATASTROPHIC_SUCCESS</span>
            </div>

            <h1 class="h1-404 text-3xl md:text-4xl font-bold mb-2 text-white"
                style="font-family: 'Space Grotesk', sans-serif;">Well, this is awkward.</h1>
            <p class="sub-404 text-gray-400 text-sm md:text-base mb-5">The routing pipeline executed perfectly. It just
                didn't find anything.</p>

            <div
                class="pipeline-card-404 bg-gray-900/40 border border-gray-800 backdrop-blur-md rounded-xl overflow-hidden glass-card">
                <div class="bg-gray-900/80 border-b border-gray-800 px-3 py-2 md:px-4 md:py-3 flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="ml-2 text-xs text-gray-400 font-mono">page_resolver.dagster</span>
                </div>
                <div class="p-3 md:p-6" id="pipeline"></div>
            </div>

            <div class="actions-404 mt-5 md:mt-6">
                <a href="index.html"
                    class="px-6 py-2.5 md:py-3 md:px-8 bg-white text-black font-semibold rounded hover:bg-gray-200 transition-colors shadow-[0_0_20px_rgba(255,255,255,0.15)] inline-flex items-center gap-2">
                    <i class="fas fa-home"></i> Abort & Return Home
                </a>
            </div>
        </div>
    </main>

    <div class="status-footer">
        <div class="status-item">
            <i class="fas fa-code-branch text-blue-500"></i>
            <span>main*</span>
        </div>
        <div class="status-item gap-1 text-red-500">
            <i class="fas fa-times-circle"></i>
            <span>pipeline: failed</span>
        </div>
        <div class="status-item">
            <i class="fas fa-server text-yellow-600"></i>
            <span>status: 404</span>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        const stages = [
            {
                name: "Client Handshake", meta: "12ms · You made it here. Congrats.", state: "success", icon: "fa-check", connector: "lit",
                colorClass: "text-green-500 bg-green-500/10 border-green-500/30"
            },
            {
                name: "URL Analysis", meta: "45ms · Read the URL. Instantly regretted it.", state: "success", icon: "fa-check", connector: "lit",
                colorClass: "text-green-500 bg-green-500/10 border-green-500/30"
            },
            {
                name: "Asset Retrieval", meta: "ERROR · Literal garbage detected.", state: "fail", icon: "fa-times", connector: "dead",
                colorClass: "text-red-500 bg-red-500/10 border-red-500/30",
                error: "<div class='text-red-500 font-bold mb-1'>LatentSpaceEmptyError:</div><div class='text-gray-400'>We combed through the entire repo. We even checked the recycle bin. Nobody knows what this URL is.</div>"
            },
            {
                name: "Scapegoat Generation", meta: "2ms · Blamed the frontend developer.", state: "warn", icon: "fa-user-ninja", connector: "warn",
                colorClass: "text-yellow-500 bg-yellow-500/10 border-yellow-500/30"
            },
            {
                name: "Existential Crisis", meta: "ACTIVE · Why do we even route?", state: "warn", icon: "fa-circle-notch spinning", connector: null,
                colorClass: "text-yellow-500 bg-yellow-500/10 border-yellow-500/30"
            },
        ];

        setTimeout(() => {
            const pipe = document.getElementById('pipeline');
            if (!pipe) return;

            stages.forEach((s, i) => {
                const stageEl = document.createElement('div');
                stageEl.className = 'stage flex items-stretch gap-0 mb-0';
                const isLast = i === stages.length - 1;

                stageEl.innerHTML = `
            <div class="flex flex-col items-center w-8 md:w-10 shrink-0 pt-0.5 z-10">
              <div class="w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center text-[10px] md:text-xs border z-20 transition-all duration-300 ${s.colorClass}">
                <i class="fas ${s.icon}"></i>
              </div>
              ${!isLast ? '<div class="connector ' + s.connector + ' w-0.5 flex-1 min-h-[16px] md:min-h-[20px] my-[-4px] z-10 bg-gray-800"></div>' : ''}
            </div>
            <div class="flex-1 pb-3 md:pb-4 pl-3 md:pl-4">
              <div class="font-bold text-white text-[13px] md:text-base leading-tight" style="font-family:'Space Grotesk',sans-serif;">${s.name}</div>
              <div class="font-mono text-[9px] md:text-xs text-gray-400 mt-1">${s.meta}</div>
              ${s.error ? '<div class="mt-1.5 md:mt-2 p-2 md:p-2.5 bg-red-500/5 border border-red-500/20 rounded-md font-mono text-[9px] md:text-xs leading-relaxed">' + s.error + '</div>' : ''}
            </div>
          `;
                pipe.appendChild(stageEl);

                // Stagger the animations
                setTimeout(() => stageEl.classList.add('show'), 800 + i * 700);
            });
        }, 1500); // Wait for loader overlay to fade a bit
    </script>
</body>

</html>
